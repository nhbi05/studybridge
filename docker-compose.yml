services:
  db:
    image: postgres:13
    container_name: muk_db
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      POSTGRES_DB: muk_study_bridge
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: adminpassword
    ports:
      - "5432:5432"

  web:
    build: ./backend
    container_name: muk_web
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      - DEBUG=1
      - DB_NAME=muk_study_bridge
      - DB_USER=admin
      - DB_PASSWORD=adminpassword
      - DB_HOST=db
      - DB_PORT=5432

volumes:
  postgres_data:
